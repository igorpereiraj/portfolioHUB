<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco de Dados - Avançado</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .slide-container {
            width: 1280px;
            min-height: 720px;
            background: #FFFFFF;
            display: flex;
            flex-direction: column;
            padding: 60px 80px;
            font-family: 'Inter', sans-serif;
        }

        .header {
            margin-bottom: 40px;
        }

        .title {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 700;
            color: #1A1A1A;
            margin-bottom: 16px;
        }

        .divider {
            width: 60px;
            height: 2px;
            background: #1A1A1A;
            margin-bottom: 24px;
        }

        .subtitle {
            font-size: 16px;
            color: #666666;
            line-height: 1.6;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 40px;
            flex: 1;
            align-items: start;
        }

        .column {
            display: flex;
            flex-direction: column;
        }

        .column-title {
            font-size: 16px;
            font-weight: 600;
            color: #1A1A1A;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #0055FF;
        }

        .item {
            font-size: 14px;
            color: #333333;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .item::before {
            content: "▸ ";
            color: #0055FF;
            font-weight: 600;
            margin-right: 8px;
        }

        .certification-box {
            background: #F5F5F5;
            border-left: 4px solid #0055FF;
            padding: 20px;
            margin-top: 20px;
        }

        .cert-label {
            font-size: 12px;
            color: #0055FF;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .cert-title {
            font-size: 16px;
            font-weight: 600;
            color: #1A1A1A;
            margin-bottom: 8px;
        }

        .cert-details {
            font-size: 13px;
            color: #666666;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="header">
            <div class="title">Banco de Dados</div>
            <div class="divider"></div>
            <div class="subtitle">Avançado - Formação Certificada e Prática</div>
        </div>

        <div class="content-grid">
            <div class="column">
                <div class="column-title">Tecnologias</div>
                <div class="item">SQL</div>
                <div class="item">MySQL</div>
                <div class="item">Modelagem Relacional</div>
                <div class="item">Otimização de Consultas</div>
            </div>

            <div class="column">
                <div class="certification-box">
                    <div class="cert-label">Certificação</div>
                    <div class="cert-title">SENAI</div>
                    <div class="cert-details">Desenvolvimento de Banco de Dados</div>
                    <div class="cert-details" style="margin-top: 8px; color: #0055FF; font-weight: 600;">4 meses de formação intensiva</div>
                </div>
            </div>

            <div class="column">
                <div class="column-title">Competências</div>
                <div class="item">Design de schemas</div>
                <div class="item">Consultas complexas</div>
                <div class="item">Integridade de dados</div>
                <div class="item">Normalização</div>
            </div>
        </div>
    </div>
</body>
</html>
