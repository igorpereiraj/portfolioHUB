<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Igor Pereira de Jesus - Habilidades</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .slide-container {
            width: 1280px;
            min-height: 720px;
            background: #FFFFFF;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding-left: 80px;
            padding-right: 80px;
            font-family: 'Inter', sans-serif;
        }

        .content {
            max-width: 600px;
        }

        .name {
            font-family: 'Playfair Display', serif;
            font-size: 64px;
            font-weight: 700;
            color: #1A1A1A;
            line-height: 1.2;
            margin-bottom: 16px;
        }

        .subtitle {
            font-size: 20px;
            color: #0055FF;
            font-weight: 600;
            margin-bottom: 24px;
            letter-spacing: 0.5px;
        }

        .divider {
            width: 60px;
            height: 2px;
            background: #1A1A1A;
            margin-bottom: 32px;
        }

        .description {
            font-size: 16px;
            color: #666666;
            line-height: 1.6;
            font-weight: 400;
        }

        .highlight {
            color: #0055FF;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="content">
            <div class="name">Igor Pereira de Jesus</div>
            <div class="subtitle">Habilidades e Competências Técnicas</div>
            <div class="divider"></div>
            <div class="description">
                Estudante de <span class="highlight">Análise e Desenvolvimento de Sistemas</span> no CEUB, com formação certificada em banco de dados e experiência prática em múltiplas tecnologias.
            </div>
        </div>
    </div>
</body>
</html>
